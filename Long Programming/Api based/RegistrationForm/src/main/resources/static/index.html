<html>
<head>
    <title>User Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .container {
            background-color: white;
            width: 300px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #aaa;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
<div class = "container">
    <h2> User Registration Form</h2>
    <input type="text" placeholder="enter name" id="username">
    <input type="text" placeholder="enter ph number" id="userPh">
    <input type="text" placeholder="enter age" id="userAge">
    <input type="text" placeholder="enter dept" id="userDept">
    <input type="text" placeholder="enter year of passing" id="userYOP">


<button onclick="savedata()">Save</button>
</div>
<script>
    function savedata() {
       alert("Data Saved");
     var user = {
    userName: document.getElementById("username").value,
    userPh: document.getElementById("userPh").value,
    userAge: document.getElementById("userAge").value,
    userDept: document.getElementById("userDept").value,
    YearOfPass: document.getElementById("userYOP").value
};

        fetch("/user", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(user)
        });

    }
</script>

</body>
</html>
